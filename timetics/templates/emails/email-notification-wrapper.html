<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{COMPANY_NAME}}</title>
    </head>
    <body>
        <div class="email-wrapper" style="margin-bottom: 30px; background-color: #f4f5f7; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji', sans-serif;">
            <div style="max-width: 600px; margin: 0 auto;">
                <div class="email-content" style="padding: 40px; background-color: #ffffff; border-radius: 0 0 12px 12px; border-top: 4px solid {{PRIMARY_COLOR}}; margin-bottom: 40px;">
                    {{MESSAGE}}
                </div>
                <div style="text-align: center; padding: 0 40px 30px; font-size: 12px; color: #8da3b4;">
                    <p style="margin: 0 0 4px;">{{COMPANY_NAME}}</p>
                    {%powered_by_section%}
                </div>
            </div>
        </div>
    </body>
</html>
